<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - SafeSeat</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <div id="screen-login" class="screen active fade-in" style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
        <div class="login-layout">
            <div class="login-hero">
                <div class="login-hero-title">บริการผู้ขับขี่<br>แทน<span>ทั่วไทย</span></div>
                <p class="login-hero-sub">SafeSeat ให้บริการผู้ขับขี่แทนที่ผ่านการตรวจสอบแล้ว เดินทางปลอดภัยทุกที่ทุกเวลา</p>
                <div class="login-feature-list">
                    <div class="login-feature">
                        <div class="login-feature-icon">✅</div>ผู้ขับขี่ผ่านการตรวจสอบประวัติ
                    </div>
                    <div class="login-feature">
                        <div class="login-feature-icon">🛡️</div>ประกันภัยทุกเที่ยวการเดินทาง
                    </div>
                </div>
            </div>
            <div class="login-card-wrap">
                <div class="login-logo-wrap">
                    <div class="login-logo-icon">🛡️</div>
                    <div class="login-app-name">SAFE SEAT</div>
                </div>
                <div class="form-group">
                    <label class="form-label">เบอร์มือถือ<span class="req">*</span></label>
                    <input type="tel" class="form-input" id="loginPhone" placeholder="081-234-5678" />
                </div>
                <div class="form-group">
                    <label class="form-label">รหัสผ่าน<span class="req">*</span></label>
                    <input type="password" class="form-input" id="loginPass" placeholder="••••••••" />
                </div>
                <button class="btn btn-primary btn-full btn-lg" onclick="doLogin()">เข้าสู่ระบบ →</button>
                <div style="text-align: center; margin-top: 24px; font-size: 0.9rem; color: var(--text-secondary);">
                    ยังไม่มีบัญชี? <a href="Registration.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">สมัครสมาชิก</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
