<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เพิ่มยานพาหนะ - SafeSeat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&family=Inter:wght@400;600;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #00C2FF;
            --surface1: #f8fafc;
            --surface2: #f1f5f9;
            --text-main: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --error: #ef4444;
        }

        body {
            font-family: 'Kanit', 'Inter', sans-serif;
            background-color: white;
        }

        /* Mobile Sidebar Transformation */
        @media (max-width: 1024px) {
            .dash-layout {
                flex-direction: column;
                padding-top: 80px !important;
            }

            .dash-sidebar {
                width: 100% !important;
                display: flex !important;
                overflow-x: auto;
                gap: 10px;
                padding-bottom: 15px;
                border-bottom: 1px solid var(--border);
            }

            .profile-mini {
                display: none !important;
            }

            .menu-item {
                margin-bottom: 0 !important;
                white-space: nowrap;
            }
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-main);
            transition: 0.2s;
        }

        .menu-item.active {
            background: var(--surface2);
            font-weight: 700;
        }

        .gear-btn {
            background: var(--surface1);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .gear-btn:hover {
            border-color: var(--primary);
            background: white;
        }

        .gear-btn.active {
            background: rgba(0, 194, 255, 0.05);
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Responsive Grids */
        @media (max-width: 640px) {
            .input-grid {
                grid-template-columns: 1fr !important;
            }

            .gear-grid {
                grid-template-columns: 1fr !important;
            }

            .header-box {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>

<body>
    <header
        class="fixed top-0 left-0 right-0 h-[70px] bg-white border-b border-gray-100 flex items-center justify-between px-6 z-[1000]">
        <div class="flex items-center gap-2 font-extrabold text-xl cursor-pointer"
            onclick="window.location.href='profile.html'">
            <span>🛡️</span> Safe<span class="text-[#00C2FF]">Seat</span>
        </div>
        <button class="text-gray-500 font-semibold text-sm hover:text-red-500 transition"
            onclick="logout()">ออกจากระบบ</button>
    </header>

    <div class="max-w-7xl mx-auto px-4 md:px-6 pt-[100px] pb-12">
        <div class="dash-layout flex gap-8">

            <aside class="dash-sidebar w-[280px] shrink-0">
                <div class="profile-mini bg-slate-50 p-5 rounded-2xl flex items-center gap-3 mb-6">
                    <div class="w-10 h-10 bg-slate-200 rounded-xl flex items-center justify-center text-[#00C2FF]">
                        <i data-lucide="user" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <div class="font-bold text-sm">วุฒิชัย ดวงยี่หวา</div>
                        <div class="text-[11px] text-[#00C2FF] font-bold cursor-pointer"
                            onclick="location.href='edit-profile.html'">แก้ไขโปรไฟล์</div>
                    </div>
                </div>

                <nav class="space-y-2 flex flex-col md:block">
                    <a href="profile.html" class="menu-item">
                        <i data-lucide="layout-dashboard" class="mr-3 w-5 h-5"></i> โปรไฟล์
                    </a>
                    <a href="#" class="menu-item active">
                        <i data-lucide="car" class="mr-3 w-5 h-5"></i> ยานพาหนะของฉัน
                    </a>
                    <a href="topup.html" class="menu-item">
                        <i data-lucide="credit-card" class="mr-3 w-5 h-5"></i> SafeSeat Wallet
                    </a>
                </nav>
            </aside>

            <main class="dash-main flex-grow min-w-0">
                <button onclick="handleBack()"
                    class="mb-6 w-11 h-11 bg-white rounded-xl shadow-sm border border-gray-100 flex items-center justify-center hover:bg-gray-50 transition-all active:scale-95">
                    <i data-lucide="arrow-left" class="w-5 h-5 text-gray-900"></i>
                </button>

                <div
                    class="header-box bg-slate-50 border border-slate-200 rounded-[24px] p-6 md:p-8 flex items-center gap-6 mb-8">
                    <div class="bg-white w-16 h-16 rounded-2xl flex items-center justify-center shadow-sm shrink-0">
                        <i data-lucide="car" class="w-8 h-8 text-[#00C2FF]"></i>
                    </div>
                    <div>
                        <h1 class="text-xl md:text-2xl font-extrabold text-slate-800">เพิ่มข้อมูลยานพาหนะ</h1>
                        <p class="text-slate-500 text-sm md:text-base mt-1">ตรวจสอบข้อมูลให้ถูกต้อง
                            ข้อมูลนี้จะช่วยให้ระบบจับคู่ผู้ขับขี่ที่เหมาะสม</p>
                    </div>
                </div>

                <div class="bg-white border border-gray-100 rounded-3xl p-6 md:p-8 shadow-sm">
                    <div class="mb-10">
                        <h3 class="flex items-center gap-2 font-bold text-lg mb-6"><span class="text-xl">🚗</span>
                            ข้อมูลยานพาหนะ</h3>
                        <div class="input-grid grid grid-cols-2 gap-6">
                            <div class="flex flex-col gap-2">
                                <label class="text-sm font-bold text-slate-700">Car Brand *</label>
                                <input type="text" placeholder="e.g. Toyota, Honda"
                                    class="w-full p-4 bg-slate-50 border-2 border-slate-50 rounded-xl focus:border-[#00C2FF] focus:bg-white outline-none transition-all">
                            </div>
                            <div class="flex flex-col gap-2">
                                <label class="text-sm font-bold text-slate-700">Model *</label>
                                <input type="text" placeholder="e.g. Camry, Civic"
                                    class="w-full p-4 bg-slate-50 border-2 border-slate-50 rounded-xl focus:border-[#00C2FF] focus:bg-white outline-none transition-all">
                            </div>
                        </div>
                    </div>

                    <div class="mb-10">
                        <h3 class="flex items-center gap-2 font-bold text-lg mb-4"><span class="text-xl">⚙️</span>
                            สเปคเกียร์</h3>
                        <div class="gear-grid grid grid-cols-3 gap-4">
                            <div class="gear-btn active" onclick="selectGear('automatic', this)">
                                <span class="text-2xl">🌐</span>
                                <span class="font-bold text-sm">Automatic</span>
                            </div>
                            <div class="gear-btn" onclick="selectGear('manual', this)">
                                <span class="text-2xl">🤚</span>
                                <span class="font-bold text-sm">Manual</span>
                            </div>
                            <div class="gear-btn" onclick="selectGear('electric', this)">
                                <span class="text-2xl">⚡</span>
                                <span class="font-bold text-sm">Electric</span>
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-col sm:flex-row justify-end gap-4 pt-8 border-t border-slate-100">
                        <button class="px-8 py-4 font-bold text-slate-400 hover:text-slate-600 transition"
                            onclick="handleBack()">ยกเลิก</button>
                        <button
                            class="px-10 py-4 bg-black text-white rounded-2xl font-bold hover:bg-[#00C2FF] transition-all shadow-lg"
                            onclick="saveCar()">
                            บันทึกยานพาหนะใหม่ →
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // FIX BACK BUTTON: Define handleBack to go to profile or specific page
        function handleBack() {
            // Option 1: Go back to profile.html (Recommended)
            window.location.href = 'profile.html';

            // Option 2: Browser history back (Uncomment below if preferred)
            // window.history.back();
        }

        function selectGear(type, el) {
            document.querySelectorAll('.gear-btn').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
        }

        function saveCar() {
            alert('บันทึกข้อมูลยานพาหนะเรียบร้อยแล้ว');
            window.location.href = 'profile.html';
        }

        function logout() {
            window.location.href = 'login.html';
        }
    </script>
</body>

</html>
