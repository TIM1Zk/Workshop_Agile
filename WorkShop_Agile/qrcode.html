<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ชำระเงิน PromptPay - SafeSeat</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .qr-card {
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
        }
        .qr-container {
            background: white;
            padding: 24px;
            border-radius: 16px;
            margin: 24px 0;
            display: inline-block;
        }
        .qr-image {
            width: 250px;
            height: 250px;
            background: #f8f9fa;
            border: 1px solid #eee;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: #ccc;
        }
        .pp-logo {
            width: 120px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <header class="topbar" id="mainTopbar">
        <div class="topbar-logo" onclick="window.location.href='profile.html'">
            <div class="logo-icon">🛡️</div> Safe<span>Seat</span>
        </div>
        <nav class="topbar-nav">
            <a id="nav-profile" href="profile.html">โปรไฟล์</a>
            <a id="nav-topup" href="topup.html" class="active">เติมเงิน</a>
        </nav>
        <div class="topbar-actions">
            <button class="btn btn-ghost btn-sm" onclick="logout()">ออกจากระบบ</button>
        </div>
    </header>

    <div id="screen-qrcode" class="screen fade-in" style="padding-top:100px; min-height: 100vh;">
      <div class="dash-layout">
        <!-- Sidebar omitted for focus on payment -->
        <div class="dash-main" style="width: 100%;">
          <div class="qr-card">
            <div class="card">
                <div style="display: flex; align-items: center; justify-content: center; margin-bottom: 24px;">
                    <div style="background: white; padding: 8px 16px; border-radius: 8px;">
                        <span style="color: #003764; font-weight: 800; font-size: 1.2rem;">Prompt</span><span style="color: #bc2231; font-weight: 800; font-size: 1.2rem;">Pay</span>
                    </div>
                </div>

                <div class="section-heading" style="margin-bottom: 8px;">สแกนเพื่อชำระเงิน</div>
                <div style="font-size: 2.5rem; font-weight: 800; color: white; margin: 16px 0;" id="qr-amount-display">฿0.00</div>
                
                <div class="qr-container">
                    <!-- Placeholder QR Image -->
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=SafeSeatPaymentDemo" alt="PromptPay QR Code" style="width: 250px; height: 250px; display: block;">
                </div>

                <div style="margin-top: 24px; color: var(--text-secondary); font-size: 0.9rem;">
                    <div>ชื่อบัญชี: <strong>SafeSeat Co., Ltd.</strong></div>
                    <div style="margin-top: 8px;">กรุณาชำระเงินภายใน <span id="countdown" style="color: var(--error); font-weight: 700;">15:00</span></div>
                </div>

                <button class="btn btn-primary btn-full" style="margin-top: 32px; padding: 16px;" onclick="window.location.href='profile.html'">
                    ฉันชำระเงินเรียบร้อยแล้ว
                </button>
                <button class="btn btn-ghost btn-full" style="margin-top: 12px;" onclick="window.location.href='topup.html'">
                    ยกเลิกและกลับไปแก้ไข
                </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const amount = localStorage.getItem('lastTopupAmount') || '0';
            const display = document.getElementById('qr-amount-display');
            if (display) {
                display.textContent = `฿${parseFloat(amount).toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            }
            startCountdown(15 * 60); // 15 minutes
        });

        function startCountdown(duration) {
            let timer = duration, minutes, seconds;
            const display = document.querySelector('#countdown');
            const interval = setInterval(function () {
                minutes = parseInt(timer / 60, 10);
                seconds = parseInt(timer % 60, 10);

                minutes = minutes < 10 ? "0" + minutes : minutes;
                seconds = seconds < 10 ? "0" + seconds : seconds;

                display.textContent = minutes + ":" + seconds;

                if (--timer < 0) {
                    clearInterval(interval);
                    display.textContent = "EXPIRED";
                    // Optionally redirect or show error
                }
            }, 1000);
        }
    </script>
</body>
</html>
