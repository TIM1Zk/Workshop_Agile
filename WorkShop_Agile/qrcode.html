<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ชำระเงิน PromptPay - SafeSeat</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&family=Inter:wght@400;600;700&display=swap"
        rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background-color: #ffffff;
            font-family: 'Inter', 'Kanit', sans-serif;
        }

        .qr-card-layout {
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
        }

        .qr-container {
            background: #ffffff;
            padding: 24px;
            border-radius: 24px;
            margin: 32px 0;
            display: inline-block;
            border: 2px solid var(--border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body>
    <div class="toast-container" id="toastContainer"></div>

    <header class="topbar" id="mainTopbar">
        <div class="topbar-logo" onclick="window.location.href='profile.html'">
            <div class="logo-icon">🛡️</div> Safe<span>Seat</span>
        </div>
        <nav class="topbar-nav">
            <a id="nav-profile" href="profile.html">โปรไฟล์</a>
            <a id="nav-topup" href="topup.html" class="active">เติมเงิน</a>
        </nav>
        <div class="topbar-actions">
            <button class="btn btn-ghost btn-sm" onclick="logout()">ออกจากระบบ</button>
        </div>
    </header>

    <div id="screen-qrcode" class="screen fade-in" style="padding-top:100px; min-height: 100vh;">
        <div class="dash-layout">
            <div class="dash-main" style="width: 100%;">
                <div class="qr-card-layout">
                    <div class="card" style="border-radius: 32px; padding: 48px;">
                        <div style="display: flex; align-items: center; justify-content: center; margin-bottom: 32px;">
                            <div
                                style="background: #f8fafc; padding: 12px 24px; border-radius: 12px; border: 1px solid #e2e8f0; display: flex; gap: 4px;">
                                <span
                                    style="color: #003764; font-weight: 800; font-size: 1.5rem; letter-spacing: -1px;">Prompt</span><span
                                    style="color: #bc2231; font-weight: 800; font-size: 1.5rem; letter-spacing: -1px;">Pay</span>
                            </div>
                        </div>

                        <div class="section-heading" style="margin-bottom: 8px; font-weight: 800;">สแกนเพื่อชำระเงิน
                        </div>
                        <div style="font-size: 3rem; font-weight: 900; color: var(--primary); margin: 24px 0;"
                            id="qr-amount-display">฿1,250.00</div>

                        <div class="qr-container">
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=SafeSeatPaymentDemo"
                                alt="PromptPay QR Code" style="width: 250px; height: 250px; display: block;">
                        </div>

                        <div style="margin-top: 32px; color: var(--text-secondary); font-size: 1rem; line-height: 1.6;">
                            <div style="font-weight: 700;">ชื่อบัญชี: <span style="color: var(--text-main);">SafeSeat
                                    Co., Ltd.</span></div>
                            <div style="margin-top: 12px; font-weight: 600;">กรุณาชำระเงินภายใน <span id="countdown"
                                    style="color: var(--error); font-weight: 800; background: rgba(239, 68, 68, 0.1); padding: 4px 12px; border-radius: 8px;">15:00</span>
                            </div>
                        </div>

                        <div style="margin-top: 48px; display: flex; flex-direction: column; gap: 16px;">
                            <button class="btn btn-primary btn-full"
                                style="padding: 20px; font-size: 1.15rem; border-radius: 16px;"
                                onclick="window.location.href='profile.html'">
                                ฉันชำระเงินเรียบร้อยแล้ว
                            </button>
                            <button class="btn btn-ghost btn-full"
                                style="padding: 16px; font-size: 1rem; font-weight: 700;"
                                onclick="window.location.href='topup.html'">
                                ยกเลิกและกลับไปแก้ไข
                            </button>
                        </div>

                        <div
                            style="text-align: center; font-size: 0.85rem; color: var(--text-muted); margin-top: 40px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px;">
                            🛡️ ข้อมูลของคุณปลอดภัยและได้รับความคุ้มครอง
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const amount = urlParams.get('amount') || '1250';
            const display = document.getElementById('qr-amount-display');
            if (display) {
                display.textContent = `฿${parseFloat(amount).toLocaleString(undefined, { minimumFractionDigits: 2 })}`;
            }
            startCountdown(15 * 60); // 15 minutes
        });

        function startCountdown(duration) {
            let timer = duration, minutes, seconds;
            const display = document.querySelector('#countdown');
            const interval = setInterval(function () {
                minutes = parseInt(timer / 60, 10);
                seconds = parseInt(timer % 60, 10);

                minutes = minutes < 10 ? "0" + minutes : minutes;
                seconds = seconds < 10 ? "0" + seconds : seconds;

                display.textContent = minutes + ":" + seconds;

                if (--timer < 0) {
                    clearInterval(interval);
                    display.textContent = "EXPIRED";
                }
            }, 1000);
        }
    </script>
</body>

</html>
